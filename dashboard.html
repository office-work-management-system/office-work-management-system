<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;

}

header{

background:#1565C0;
padding:20px;
color:white;
text-align:center;

}

.container{

padding:30px;

}

.card{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);

}

button{

margin-top:20px;
padding:12px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

</style>

</head>

<body>

<header>

<h1>Office Work Management System</h1>

</header>

<div class="container">

<div class="card">

<h2>Welcome Admin</h2>

<p>আপনি সফলভাবে Login করেছেন।</p>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>

function logout(){

window.location.href="index.html";

}

</script>

</body>
</html>
